<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Aula 6 – Atividades | English + Tech</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#0f1220;
  --card:#1b1f3b;
  --accent:#4a6cf7;
  --text:#eaeaf0;
  --muted:#aab0d6;
  --success:#4caf50;
  --error:#ff5c5c;
}

body{
  margin:0;
  padding:20px 20px 90px;
  font-family:Segoe UI, Arial, sans-serif;
  background:linear-gradient(135deg,#0f1220,#14183a);
  color:var(--text);
}

.card{
  background:var(--card);
  padding:24px;
  border-radius:16px;
  max-width:720px;
  margin:40px auto;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

button{
  background:var(--accent);
  border:none;
  border-radius:8px;
  padding:12px 18px;
  color:white;
  cursor:pointer;
  font-size:15px;
  margin-top:14px;
}

button.secondary{
  background:#242862;
}

button:disabled{
  opacity:.5;
  cursor:not-allowed;
}

.options button{
  display:block;
  width:100%;
  margin:10px 0;
}

input, textarea{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  margin-top:10px;
  font-size:15px;
}

textarea{
  min-height:140px;
  resize:vertical;
}

.feedback{
  margin-top:16px;
  font-weight:bold;
}

.success{color:var(--success);}
.error{color:var(--error);}

.progress{
  text-align:center;
  margin-top:20px;
  color:var(--muted);
}

footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#0b0e1a;
  text-align:center;
  font-size:.85rem;
  padding:10px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="card">

<nav>
  <button onclick="window.location.href='aula6.html'">Aula</button>
  <button onclick="window.location.href='mod1.html'">Módulo 1</button>
</nav>

<h1>🚀 Aula 6 – Atividades</h1>
<p>Foque em <strong>these / those + plural</strong> 🔢</p>

<h2 id="question"></h2>
<p id="prompt"></p>

<div id="input-area"></div>

<p id="feedback" class="feedback"></p>

<button id="nextBtn" onclick="nextActivity()" disabled>Avançar ➡️</button>

<div class="progress" id="progress"></div>

</div>

<footer>© Curso PSIDE – Inglês + Tecnologia</footer>

<script>
const activities = [

/* ===== 1–10 THESE / THOSE ===== */
{question:"Complete:",prompt:"___ are my computers. (perto)",type:"input",answers:["these"]},
{question:"Complete:",prompt:"___ are chairs. (longe)",type:"input",answers:["those"]},
{question:"Choose: (near)",type:"choice",options:["These are my books","Those are my books"],answer:"These are my books"},
{question:"Choose:",type:"choice",options:["These are far","Those are far"],answer:"Those are far"},
{question:"Translate:",prompt:"These are my computers",type:"choice",options:["Esses é computador","Aquilo é meu computador","Estes são meus computadores"],answer:"Estes são meus computadores"},
{question:"Translate:",prompt:"Those are chairs",type:"choice",options:["Estas são cadeiras","Aquelas são cadeiras","Aquilo é cadeira"],answer:"Aquelas são cadeiras"},
{question:"Complete:",prompt:"These ___ my books.",type:"input",answers:["are"]},
{question:"Complete:",prompt:"Those ___ tables.",type:"input",answers:["are"]},
{question:"Choose:",prompt:"Near objects:",type:"choice",options:["These","Those"],answer:"These"},
{question:"Choose:",prompt:"Far objects:",type:"choice",options:["These","Those"],answer:"Those"},

/* ===== 11–20 PLURAL ===== */
{question:"Plural:",prompt:"book → ?",type:"input",answers:["books"]},
{question:"Plural:",prompt:"chair → ?",type:"input",answers:["chairs"]},
{question:"Plural:",prompt:"box → ?",type:"input",answers:["boxes"]},
{question:"Plural:",prompt:"baby → ?",type:"input",answers:["babies"]},
{question:"Choose:",prompt:"Correct plural:",type:"choice",options:["classs","classes"],answer:"classes"},
{question:"Choose:",prompt:"Correct plural:",type:"choice",options:["toys","toies"],answer:"toys"},
{question:"Choose:",prompt:"Irregular:",type:"choice",options:["mans","men"],answer:"men"},
{question:"Choose:",prompt:"Irregular:",type:"choice",options:["childs","children"],answer:"children"},
{question:"Complete:",prompt:"One computer → many ______",type:"input",answers:["computers"]},
{question:"Complete:",prompt:"One chair → many ______",type:"input",answers:["chairs"]},

/* ===== 21–30 STRUCTURE ===== */
{question:"Choose:",type:"choice",options:["These my computers are","These are my computers","Are my computers these"],answer:"These are my computers"},
{question:"Choose:",type:"choice",options:["Are chairs those","Those my chairs are","Those are my chairs"],answer:"Those are my chairs"},
{question:"Translate:",prompt:"These are my files",type:"choice",options:["Estes são meus arquivos","Aquilo é arquivo","Esses é arquivo"],answer:"Estes são meus arquivos"},
{question:"Translate:",prompt:"Those are my errors",type:"choice",options:["Eu tenho erros","Esses são erros","Aqueles são meus erros"],answer:"Aqueles são meus erros"},
{question:"Complete:",prompt:"These are my ______ (💻🖥️👩🏻‍💻)",type:"input",answers:["computers"]},
{question:"Complete:",prompt:"Those are ______ (🪑🪑🪑🪑)",type:"input",answers:["chairs"]},
{question:"Choose:",prompt:"Correct:",type:"choice",options:["Variables are these","These variables are","These are variables"],answer:"These are variables"},
{question:"Choose:",prompt:"Correct:",type:"choice",options:["Those are errors","Those errors are","Errors are those"],answer:"Those are errors"},
{question:"Complete:",prompt:"These ___ my variables",type:"input",answers:["are"]},
{question:"Complete:",prompt:"Those ___ my results",type:"input",answers:["are"]},

/* ===== 31–33 LISTENING ===== */
{
question:"Listening – Ouça:",
audio:"These are my computers.",
type:"choice",
options:[
"These are my computers.",
"Those are my computers.",
"This is my computer."
],
answer:"These are my computers."
},
{
question:"Listening – Ouça:",
audio:"Those are chairs.",
type:"choice",
options:[
"Those are chairs.",
"These are chairs.",
"That is a chair."
],
answer:"Those are chairs."
},

/* ===== 34–36 SPEAKING ===== */
{
question:"Speaking – Say:",
prompt:"These are my computers.",
type:"speech",
answers:["these are my computers"]
},
{
question:"Speaking – Say:",
prompt:"Those are chairs.",
type:"speech",
answers:["those are chairs"]
},

/* ===== 37–40 WRITING ===== */
{
question:"Escreva em inglês:",
prompt:"Estes são meus computadores.",
type:"input",
answers:["these are my computers"]
},
{
question:"Escreva em inglês:",
prompt:"Aquelas são cadeiras.",
type:"input",
answers:["those are chairs"]
},
{
question:"Traduza:",
prompt:"These are my variables",
type:"choice",
options:[
"Estas são minhas variáveis",
"Aquilo é variável",
"Eu gosto de variáveis"
],
answer:"Estas são minhas variáveis"
},
{
question:"Traduza:",
prompt:"Those are my errors",
type:"choice",
options:[
"Aqueles são meus erros",
"Esses é erro",
"Eu corrijo erros"
],
answer:"Aqueles são meus erros"
},

/* ===== 41–43 MISSION ===== */
{
question:"Missão – Escreva:",
prompt:"Escreva 2 frases com THESE e 2 com THOSE (plural): Esses são meus computadores. Esses são meus livros. Aquelas são cadeiras. Aquelas são mesas.",
type:"textarea",
answers:[
"these are my computers these are my books those are chairs those are tables"
]
},
{
question:"Missão – Speaking:",
prompt:"These are my computers and those are chairs.",
type:"speech",
answers:["these are my computers and those are chairs"]
},
{
question:"Final:",
prompt:"Choose the correct:",
type:"choice",
options:[
"These near are",
"Those are near",
"These are near"
],
answer:"These are near"
}

];

let index = 0;
let spokenResult = "";

const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang = "en-US";

function normalize(text){
  return text.toLowerCase().trim().replace(/\n/g," ").replace(/\s+/g," ").replace(/[.,]/g,"");
}

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  speechSynthesis.speak(u);
}

function loadActivity(){
  const a = activities[index];
  document.getElementById("question").innerText = `📝 ${a.question}`;
  document.getElementById("prompt").innerText = a.prompt || "";
  document.getElementById("feedback").innerText = "";
  document.getElementById("nextBtn").disabled = true;

  const area = document.getElementById("input-area");
  area.innerHTML = "";

  if(a.audio){
    const btn = document.createElement("button");
    btn.innerText = "🔊 Ouvir áudio";
    btn.onclick = ()=> speak(a.audio);
    area.appendChild(btn);
  }

  if(a.type === "input"){
    const input = document.createElement("input");
    input.oninput = ()=> checkAnswer(input.value);
    area.appendChild(input);
  }

  if(a.type === "textarea"){
    const ta = document.createElement("textarea");
    ta.oninput = ()=> checkAnswer(ta.value);
    area.appendChild(ta);
  }

  if(a.type === "choice"){
    const div = document.createElement("div");
    div.className = "options";
    a.options.forEach(opt=>{
      const btn = document.createElement("button");
      btn.innerText = opt;
      btn.className = "secondary";
      btn.onclick = ()=> checkAnswer(opt);
      div.appendChild(btn);
    });
    area.appendChild(div);
  }

  if(a.type === "speech"){
    const btn = document.createElement("button");
    btn.innerText = "🎙️ Gravar fala";
    btn.onclick = ()=>{
      recognition.start();
      recognition.onresult = e=>{
        spokenResult = normalize(e.results[0][0].transcript);
        checkAnswer(spokenResult);
      };
    };
    area.appendChild(btn);
  }

  document.getElementById("progress").innerText =
    `Atividade ${index+1} de ${activities.length}`;
}

function checkAnswer(answer){
  const a = activities[index];
  let correct = false;

  if(a.type === "input" || a.type === "textarea"){
    correct = a.answers.includes(normalize(answer));
  }else if(a.type === "speech"){
    correct = a.answers.map(normalize).includes(answer);
  }else{
    correct = answer === a.answer;
  }

  const fb = document.getElementById("feedback");

  if(correct){
    fb.innerText = "✅ Muito bem! Pode avançar.";
    fb.className = "feedback success";
    document.getElementById("nextBtn").disabled = false;
  }else{
    fb.innerText = "❌ Revise THESE / THOSE e plural.";
    fb.className = "feedback error";
  }
}

function nextActivity(){
  index++;
  if(index < activities.length){
    loadActivity();
  }else{
    document.querySelector(".card").innerHTML = `
      <h1>🎉 Aula 6 concluída!</h1>
      <p>Agora você domina <strong>these / those + plural</strong> 🔥</p>
      <button onclick="window.location.href='mod1.html'">Voltar ao módulo</button>
    `;
  }
}

loadActivity();
</script>

</body>
</html>
